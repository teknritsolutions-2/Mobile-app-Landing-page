<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | LaunchPad Workspace Setup</title>
    <meta name="description" content="Create your LaunchPad account to set up a pre-launch workspace, invite collaborators, and start building a stronger app release funnel.">
    <link rel="icon" type="image/svg+xml" href="../assets/images/logo-mark.svg">
    <link rel="alternate icon" type="image/jpeg" href="../assets/images/logo-mark.jpg">
    <link rel="apple-touch-icon" href="../assets/images/logo-mark.jpg">
    <link rel="canonical" href="https://venkatreddy16.github.io/Mobile-App-Landing-Page-Pre-Launch-/pages/signup.html">
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebPage","name":"Signup | LaunchPad Workspace Setup","description":"Create your LaunchPad account to set up a pre-launch workspace, invite collaborators, and start building a stronger app release funnel.","url":"https://venkatreddy16.github.io/Mobile-App-Landing-Page-Pre-Launch-/pages/signup.html","isPartOf":{"@type":"WebSite","name":"LaunchPad","url":"https://launchpad.app"},"about":{"@type":"Organization","name":"LaunchPad","url":"https://launchpad.app","logo":"https://venkatreddy16.github.io/Mobile-App-Landing-Page-Pre-Launch-/assets/images/logo-mark.svg","email":"hello@launchpad.app","telephone":"+1-415-555-0134","address":{"@type":"PostalAddress","streetAddress":"220 Market Street","addressLocality":"San Francisco","addressRegion":"CA","postalCode":"94103","addressCountry":"US"}}}</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css?v=20260525-signup">
    <link rel="stylesheet" href="../assets/css/dark-mode.css?v=20260525-signup">
    <link rel="stylesheet" href="../assets/css/rtl.css?v=20260525-signup">
    <style>
        .page-signup .auth-layout {
            align-items: start;
            max-width: 460px;
            grid-template-columns: minmax(0, 1fr);
            justify-items: center;
            margin-inline: auto;
        }

        .page-signup .auth-forms-stack {
            width: min(100%, 460px);
            justify-self: center;
            align-self: start;
        }

        .page-signup .auth-card {
            width: 100%;
        }

        .page-signup .auth-social-btn {
            justify-content: center;
        }

        .page-signup .auth-switch {
            margin-top: 4px;
        }

        .page-signup .form-status:empty {
            min-height: 0;
            margin-top: 0;
        }
    </style>

</head>

<body class="login-page signup-page page-signup">
    <div class="site-shell">
        <main>
            <h1 class="sr-only">Create a LaunchPad account</h1>
            <section class="auth-section">
                <div class="container auth-layout auth-layout-enhanced">
                    <div class="auth-forms-stack">
                        <div class="auth-card auth-card-primary fade-in">
                            <div class="auth-card-head">
                                <span class="eyebrow">Signup</span>
                                <a class="brand auth-card-brand" href="./index.html" aria-label="Go to LaunchPad home page">
                                    <img class="brand-mark auth-card-brand-mark" src="../assets/images/logo-mark.svg" alt="LaunchPad logo">
                                    <span>LaunchPad</span>
                                </a>
                                <p>Open your workspace, invite your team, and start preparing for launch.</p>
                                <div class="auth-trust-strip" aria-label="Signup benefits">
                                    <span>No card required</span>
                                    <span>Invite in 2 min</span>
                                    <span>Secure workspace</span>
                                </div>
                            </div>
                            <div class="auth-socials" aria-label="Alternative sign up options">
                                <a class="auth-social-btn" href="./contact.html" aria-label="Sign up with Google">
                                    <svg viewBox="0 0 24 24" aria-hidden="true" role="presentation">
                                        <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9-3.3 0-6-2.8-6-6.1s2.7-6.1 6-6.1c1.9 0 3.2.8 3.9 1.5l2.7-2.6C16.9 3.1 14.7 2 12 2 6.5 2 2 6.5 2 12s4.5 10 10 10c5.8 0 9.6-4.1 9.6-9.8 0-.7-.1-1.3-.2-2H12Z"></path>
                                        <path fill="#34A853" d="M2 12c0 1.6.4 3.1 1.2 4.4l3.2-2.5c-.2-.6-.4-1.2-.4-1.9s.1-1.3.4-1.9L3.2 7.6C2.4 8.9 2 10.4 2 12Z"></path>
                                        <path fill="#FBBC05" d="M12 22c2.7 0 4.9-.9 6.5-2.4l-3.1-2.4c-.8.6-1.9 1-3.4 1-2.6 0-4.8-1.8-5.6-4.2l-3.3 2.5C4.7 19.8 8 22 12 22Z"></path>
                                        <path fill="#4285F4" d="M18.5 19.6c1.9-1.8 3.1-4.4 3.1-7.4 0-.7-.1-1.3-.2-2H12v3.9h5.5c-.2 1.1-.8 2.6-2.4 3.7l3.4 1.8Z"></path>
                                    </svg>
                                    <span>Sign up with Google</span>
                                </a>
                                <a class="auth-social-btn" href="./contact.html" aria-label="Sign up with Apple">
                                    <svg viewBox="0 0 24 24" aria-hidden="true" role="presentation">
                                        <path d="M16.7 12.7c0-2 1.7-3 1.8-3.1-1-1.5-2.6-1.7-3.1-1.8-1.3-.1-2.5.8-3.2.8-.7 0-1.7-.8-2.8-.8-1.5 0-2.8.9-3.6 2.2-1.5 2.6-.4 6.5 1.1 8.6.7 1.1 1.6 2.3 2.8 2.2 1.1 0 1.5-.7 2.9-.7 1.3 0 1.7.7 2.9.7 1.2 0 2-1.1 2.7-2.1.8-1.2 1.1-2.4 1.1-2.5-.1 0-2.6-1-2.6-3.5Z"></path>
                                        <path d="M14.5 6.4c.6-.8 1.1-1.9 1-3-.9.1-2.1.6-2.8 1.4-.6.7-1.1 1.8-1 2.9 1 .1 2.1-.5 2.8-1.3Z"></path>
                                    </svg>
                                    <span>Sign up with Apple</span>
                                </a>
                            </div>
                            <div class="auth-divider" aria-hidden="true">
                                <span>or create with email</span>
                            </div>
                            <form class="auth-form" data-validate data-form-behavior="demo-auth" novalidate>
                                <div class="field">
                                    <label for="signup-name">Full name</label>
                                    <input id="signup-name" name="name" type="text" required placeholder="Full name">
                                </div>
                                <div class="field">
                                    <label for="signup-email">Work email</label>
                                    <input id="signup-email" name="email" type="email" required placeholder="you@example.com">
                                </div>
                                <div class="field">
                                    <label for="signup-password">Password</label>
                                    <div class="password-field">
                                        <input id="signup-password" name="password" type="password" required placeholder="At least 8 characters">
                                        <button class="password-toggle" type="button" data-password-toggle aria-label="Show password" aria-controls="signup-password">
                                            <svg class="password-icon password-icon-eye" viewBox="0 0 24 24" aria-hidden="true" role="presentation">
                                                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                                                <circle cx="12" cy="12" r="3"></circle>
                                            </svg>
                                            <svg class="password-icon password-icon-eye-off" viewBox="0 0 24 24" aria-hidden="true" role="presentation">
                                                <path d="M3 3 21 21"></path>
                                                <path d="M10.6 10.7a3 3 0 0 0 4 4"></path>
                                                <path d="M9.9 5.2A11 11 0 0 1 12 5c6.5 0 10 7 10 7a17.3 17.3 0 0 1-3 3.8"></path>
                                                <path d="M6.2 6.2A17.7 17.7 0 0 0 2 12s3.5 7 10 7c1.8 0 3.4-.5 4.8-1.2"></path>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <div class="field">
                                    <label for="confirm-password">Confirm password</label>
                                    <div class="password-field">
                                        <input id="confirm-password" name="confirm_password" type="password" required placeholder="Repeat password">
                                        <button class="password-toggle" type="button" data-password-toggle aria-label="Show password" aria-controls="confirm-password">
                                            <svg class="password-icon password-icon-eye" viewBox="0 0 24 24" aria-hidden="true" role="presentation">
                                                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                                                <circle cx="12" cy="12" r="3"></circle>
                                            </svg>
                                            <svg class="password-icon password-icon-eye-off" viewBox="0 0 24 24" aria-hidden="true" role="presentation">
                                                <path d="M3 3 21 21"></path>
                                                <path d="M10.6 10.7a3 3 0 0 0 4 4"></path>
                                                <path d="M9.9 5.2A11 11 0 0 1 12 5c6.5 0 10 7 10 7a17.3 17.3 0 0 1-3 3.8"></path>
                                                <path d="M6.2 6.2A17.7 17.7 0 0 0 2 12s3.5 7 10 7c1.8 0 3.4-.5 4.8-1.2"></path>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <button class="primary-btn" type="submit">Create account</button>
                                <p class="form-status" data-form-status aria-live="polite" role="status"></p>
                            </form>
                            <p class="auth-switch">Already have an account? <a href="./login.html">Back to login</a></p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <script src="../assets/js/main.js"></script>
    </div>
</body>

</html>
